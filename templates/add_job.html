{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6">

        <h2 class="mb-4 fw-bold">Add New Application</h2>

        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Company Name</label>
                <input type="text" name="company" class="form-control" placeholder="e.g. Google" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Role</label>
                <input type="text" name="role" class="form-control" placeholder="e.g. Backend Developer" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Date Applied</label>
                <input type="date" name="date_applied" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Status</label>
                <select name="status" class="form-select">
                    <option value="Applied">Applied</option>
                    <option value="Interview">Interview</option>
                    <option value="Offer">Offer</option>
                    <option value="Rejected">Rejected</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Notes (optional)</label>
                <textarea name="notes" class="form-control" rows="3" placeholder="Any extra info..."></textarea>
            </div>

            <button type="submit" class="btn btn-success w-100">Save Application</button>
            <a href="/" class="btn btn-outline-secondary w-100 mt-2">Cancel</a>
        </form>

    </div>
</div>

{% endblock %}
